# Déploiement production Vercel à chaque push sur `main`.
#
# Prérequis (GitHub du repo → Settings → Secrets and variables → Actions) :
#   VERCEL_TOKEN        — Vercel → Account Settings → Tokens
#   VERCEL_ORG_ID       — ex. `team_...` (dashboard équipe ou `.vercel/project.json`)
#   VERCEL_PROJECT_ID   — ex. `prj_...` (onglet du projet Vercel → Settings → General)
#
# Si le même repo est déjà relié dans Vercel (Git → Production Branch), Vercel déploie
# aussi tout seul : dans ce cas, supprime ce fichier pour éviter deux déploiements par push.

name: Deploy Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier secrets Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Secrets Actions manquants. Ajoute VERCEL_TOKEN, VERCEL_ORG_ID et VERCEL_PROJECT_ID (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
