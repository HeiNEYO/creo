# Déploiement production via CLI (en plus ou à la place du déploiement Git natif Vercel).
#
# Activation : GitHub → Settings → Variables → Actions → VERCEL_CI_ENABLED = true
# Secrets : VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# Si cette variable n’est pas à true, le job est ignoré (pas d’échec rouge à chaque push).

name: Deploy Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.VERCEL_CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
